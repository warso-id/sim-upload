<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | SIM Upload</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter', sans-serif; background:#0a0a12; color:#fff; padding:2rem 1rem; min-height:100vh; }
        .container { max-width:1200px; margin:0 auto; }
        .header { display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; margin-bottom:2rem; gap:1rem; }
        .header h1 { font-size:2rem; font-weight:800; display:flex; align-items:center; gap:0.8rem; }
        .header h1 i { color:#ffd700; }
        .header-actions { display:flex; gap:0.8rem; align-items:center; flex-wrap:wrap; }
        .btn {
            padding:0.5rem 1.2rem; border:none; border-radius:10px; font-weight:600; font-size:0.85rem;
            cursor:pointer; transition:all 0.3s ease; font-family:'Inter', sans-serif;
            display:inline-flex; align-items:center; gap:0.4rem; text-decoration:none;
        }
        .btn-primary { background:linear-gradient(135deg,#f7971e,#ffd700); color:#0a0a12; }
        .btn-primary:hover { transform:scale(1.03); box-shadow:0 8px 30px rgba(255,215,0,0.2); }
        .btn-danger { background:#ff6b6b; color:#fff; }
        .btn-danger:hover { background:#e55a5a; transform:scale(1.03); }
        .btn-edit { background:#4a9eff; color:#fff; }
        .btn-edit:hover { background:#3a8aee; transform:scale(1.03); }
        .btn-outline { background:transparent; border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.6); }
        .btn-outline:hover { border-color:rgba(255,255,255,0.3); color:#fff; }
        .btn-sm { padding:0.3rem 0.8rem; font-size:0.75rem; border-radius:8px; }
        .btn-danger-sm { background:#ff6b6b; color:#fff; padding:0.3rem 0.8rem; font-size:0.75rem; border-radius:8px; border:none; cursor:pointer; transition:all 0.3s ease; display:inline-flex; align-items:center; gap:0.3rem; font-family:'Inter', sans-serif; }
        .btn-danger-sm:hover { background:#e55a5a; transform:scale(1.03); }
        .btn-edit-sm { background:#4a9eff; color:#fff; padding:0.3rem 0.8rem; font-size:0.75rem; border-radius:8px; border:none; cursor:pointer; transition:all 0.3s ease; display:inline-flex; align-items:center; gap:0.3rem; font-family:'Inter', sans-serif; }
        .btn-edit-sm:hover { background:#3a8aee; transform:scale(1.03); }

        .table-wrap { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.06); border-radius:20px; overflow:hidden; backdrop-filter:blur(8px); box-shadow:0 40px 80px rgba(0,0,0,0.5); }
        .table-wrap table { width:100%; border-collapse:collapse; }
        .table-wrap th { text-align:left; padding:1rem 1.2rem; background:rgba(255,255,255,0.03); color:rgba(255,255,255,0.5); font-weight:600; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid rgba(255,255,255,0.05); }
        .table-wrap td { padding:0.8rem 1.2rem; border-bottom:1px solid rgba(255,255,255,0.04); font-size:0.85rem; vertical-align:middle; }
        .table-wrap tr:hover td { background:rgba(255,255,255,0.02); }
        .table-wrap .icon-cell { font-size:1.2rem; width:50px; text-align:center; }
        .table-wrap .tag-cell { display:inline-block; font-size:0.6rem; font-weight:700; text-transform:uppercase; background:rgba(255,215,0,0.08); color:#ffd700; padding:0.15rem 0.7rem; border-radius:50px; border:1px solid rgba(255,215,0,0.1); }
        .table-wrap .actions-cell { display:flex; gap:0.5rem; flex-wrap:wrap; }
        .table-wrap .empty-row td { text-align:center; padding:3rem 0; color:rgba(255,255,255,0.3); font-style:italic; }

        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); z-index:1000; align-items:center; justify-content:center; padding:1rem; }
        .modal-overlay.active { display:flex; }
        .modal { background:#1a1a2e; border:1px solid rgba(255,255,255,0.06); border-radius:24px; padding:2rem; max-width:520px; width:100%; box-shadow:0 50px 100px rgba(0,0,0,0.8); animation:modalIn 0.3s ease; }
        @keyframes modalIn { from { transform:scale(0.95); opacity:0; } to { transform:scale(1); opacity:1; } }
        .modal h2 { font-size:1.4rem; font-weight:700; margin-bottom:0.2rem; display:flex; align-items:center; gap:0.6rem; }
        .modal h2 i { color:#ffd700; }
        .modal .sub { color:rgba(255,255,255,0.4); font-size:0.85rem; margin-bottom:1.5rem; }
        .modal .form-group { margin-bottom:1rem; }
        .modal .form-group label { display:block; color:rgba(255,255,255,0.6); font-size:0.8rem; font-weight:600; margin-bottom:0.2rem; }
        .modal .form-group input, .modal .form-group textarea { width:100%; padding:0.6rem 1rem; border-radius:10px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.04); color:#fff; font-size:0.9rem; font-family:'Inter', sans-serif; transition:border-color 0.3s; }
        .modal .form-group input:focus, .modal .form-group textarea:focus { outline:none; border-color:#ffd700; }
        .modal .form-group textarea { resize:vertical; min-height:60px; }
        .modal .form-group input::placeholder, .modal .form-group textarea::placeholder { color:rgba(255,255,255,0.2); }
        .modal .form-actions { display:flex; gap:0.8rem; justify-content:flex-end; margin-top:1.5rem; }
        .modal .form-actions .btn { min-width:100px; justify-content:center; }

        .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(80px); background:rgba(10,10,18,0.9); backdrop-filter:blur(20px); color:#fff; padding:0.7rem 2rem; border-radius:60px; font-size:0.85rem; border:1px solid rgba(255,215,0,0.1); box-shadow:0 20px 50px rgba(0,0,0,0.6); opacity:0; transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1); pointer-events:none; z-index:999; display:flex; align-items:center; gap:0.7rem; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast i { color:#ffd700; }

        .reset-wrapper { margin-top:1.5rem; text-align:right; }
        .reset-wrapper .btn { background:rgba(255,107,107,0.1); border:1px solid rgba(255,107,107,0.2); color:#ff6b6b; }
        .reset-wrapper .btn:hover { background:rgba(255,107,107,0.2); border-color:#ff6b6b; }

        @media (max-width:768px) { .header { flex-direction:column; align-items:stretch; gap:1rem; } .header-actions { justify-content:space-between; flex-wrap:wrap; } .table-wrap { overflow-x:auto; } .table-wrap table { min-width:600px; } .modal { padding:1.5rem; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-dashboard"></i> Dashboard Admin</h1>
            <div class="header-actions">
                <button class="btn btn-primary" id="btnAdd"><i class="fas fa-plus"></i> Tambah Layanan</button>
                <a href="index.html" class="btn btn-outline" target="_blank"><i class="fas fa-external-link-alt"></i> Lihat Halaman</a>
                <button class="btn btn-outline" id="btnLogout"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <thead><tr><th>#</th><th>Ikon</th><th>Judul</th><th>Tag</th><th>Deskripsi</th><th>Aksi</th></tr></thead>
                <tbody id="tableBody"><tr class="empty-row"><td colspan="6">Memuat data...</td></tr></tbody>
            </table>
        </div>

        <div class="reset-wrapper">
            <button class="btn" id="btnResetDefault"><i class="fas fa-undo"></i> Reset ke Data Default</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle"><i class="fas fa-plus-circle"></i> Tambah Layanan</h2>
            <p class="sub" id="modalSub">Isi data layanan baru</p>
            <form id="modalForm">
                <input type="hidden" id="editId" />
                <div class="form-group"><label>Ikon (Font Awesome class)</label><input type="text" id="iconInput" placeholder="fa-file-pen" required /><small style="color:rgba(255,255,255,0.3); font-size:0.7rem;">Contoh: fa-file-pen, fa-graduation-cap</small></div>
                <div class="form-group"><label>Tag / Kategori</label><input type="text" id="tagInput" placeholder="Ujian" required /></div>
                <div class="form-group"><label>Judul</label><input type="text" id="titleInput" placeholder="Soal UTS/UAS S1 & S2" required /></div>
                <div class="form-group"><label>Deskripsi</label><textarea id="descInput" placeholder="Unggah dan kelola soal ujian..." required></textarea></div>
                <div class="form-group"><label>URL</label><input type="url" id="urlInput" placeholder="https://warso-id.github.io/..." required /><small style="color:rgba(255,255,255,0.3); font-size:0.7rem;">Harus diawali dengan https://</small></div>
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" id="btnModalCancel">Batal</button>
                    <button type="submit" class="btn btn-primary" id="btnModalSubmit"><i class="fas fa-save"></i> Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMessage">Berhasil!</span></div>

    <script>
        (function() {
            'use strict';

            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            // 🔽 GANTI URL INI dengan URL Web App dari Google Apps Script
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            const GAS_URL = 'https://script.google.com/macros/s/AKfycbxzqugZFpJa2w7mzridP-N1-gVfoJ5PZiLY2GlkZ8N_ycpOsRNS0PArql9NluXnxNu_yQ/exec';

            // ─── AUTH GUARD ───
            if (sessionStorage.getItem('admin_logged_in') !== 'true') {
                window.location.href = 'admin-login.html';
                return;
            }

            // ─── DOM REFS ───
            const tbody = document.getElementById('tableBody');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalForm = document.getElementById('modalForm');
            const modalTitle = document.getElementById('modalTitle');
            const modalSub = document.getElementById('modalSub');
            const editIdInput = document.getElementById('editId');
            const iconInput = document.getElementById('iconInput');
            const tagInput = document.getElementById('tagInput');
            const titleInput = document.getElementById('titleInput');
            const descInput = document.getElementById('descInput');
            const urlInput = document.getElementById('urlInput');
            const btnSubmit = document.getElementById('btnModalSubmit');
            const btnCancel = document.getElementById('btnModalCancel');
            const btnAdd = document.getElementById('btnAdd');
            const btnLogout = document.getElementById('btnLogout');
            const btnResetDefault = document.getElementById('btnResetDefault');
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            let toastTimeout = null;

            // ─── HELPER ───
            function showToast(msg, type = 'success') {
                const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
                toastMsg.textContent = msg;
                toast.querySelector('i').className = 'fas ' + icon;
                toast.classList.add('show');
                if (toastTimeout) clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => toast.classList.remove('show'), 2800);
            }

            // ─── API CALLS ───
            async function apiCall(action, data = {}) {
                const payload = { action, ...data };
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return await res.json();
            }

            // ─── LOAD DATA ───
            async function loadData() {
                try {
                    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Memuat data...</td></tr>';
                    const result = await apiCall('getServices');
                    if (result.success && result.data) {
                        renderTable(result.data);
                    } else {
                        throw new Error(result.message || 'Gagal memuat data');
                    }
                } catch (err) {
                    console.error('Load error:', err);
                    tbody.innerHTML = `<tr class="empty-row"><td colspan="6">❌ Gagal memuat data: ${err.message}</td></tr>`;
                    showToast('Gagal memuat data: ' + err.message, 'error');
                }
            }

            function renderTable(data) {
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Belum ada layanan. Klik "Tambah Layanan" untuk menambahkan.</td></tr>';
                    return;
                }
                let html = '';
                data.forEach((item, idx) => {
                    html += `
                        <tr>
                            <td>${idx + 1}</td>
                            <td class="icon-cell"><i class="fas ${item.icon || 'fa-file'}" style="font-size:1.2rem;"></i></td>
                            <td><strong>${item.title || 'Untitled'}</strong></td>
                            <td><span class="tag-cell">${item.tag || '-'}</span></td>
                            <td style="max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${item.description || item.desc || ''}">${item.description || item.desc || ''}</td>
                            <td>
                                <div class="actions-cell">
                                    <button class="btn-edit-sm btn-edit-item" data-id="${item.id}"><i class="fas fa-edit"></i> Edit</button>
                                    <button class="btn-danger-sm btn-delete-item" data-id="${item.id}"><i class="fas fa-trash"></i> Hapus</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;

                tbody.querySelectorAll('.btn-edit-item').forEach(btn => {
                    btn.addEventListener('click', function() { openEditModal(this.dataset.id); });
                });
                tbody.querySelectorAll('.btn-delete-item').forEach(btn => {
                    btn.addEventListener('click', function() { deleteItem(this.dataset.id); });
                });
            }

            // ─── CRUD ───
            async function addItem(icon, tag, title, desc, url) {
                const result = await apiCall('addService', { icon, tag, title, desc, url });
                if (result.success) {
                    showToast('Layanan berhasil ditambahkan! ✅');
                    loadData();
                } else {
                    showToast('Gagal: ' + result.message, 'error');
                }
            }

            async function updateItem(id, icon, tag, title, desc, url) {
                const result = await apiCall('updateService', { id, icon, tag, title, desc, url });
                if (result.success) {
                    showToast('Layanan berhasil diperbarui! ✅');
                    loadData();
                } else {
                    showToast('Gagal: ' + result.message, 'error');
                }
            }

            async function deleteItem(id) {
                if (!confirm('Yakin ingin menghapus layanan ini?')) return;
                const result = await apiCall('deleteService', { id });
                if (result.success) {
                    showToast('Layanan berhasil dihapus! 🗑️');
                    loadData();
                } else {
                    showToast('Gagal: ' + result.message, 'error');
                }
            }

            async function resetToDefault() {
                if (!confirm('⚠️ Yakin ingin mereset semua data ke default? Data yang ada akan hilang!')) return;
                try {
                    // Hapus semua data dulu
                    const current = await apiCall('getServices');
                    if (current.success && current.data) {
                        for (const item of current.data) {
                            await apiCall('deleteService', { id: item.id });
                        }
                    }
                    // Tambah data default
                    const defaults = [
                        ['fa-file-pen', 'Ujian', 'Soal UTS/UAS S1 & S2', 'Unggah dan kelola soal ujian untuk jenjang S1 dan S2', 'https://warso-id.github.io/form-uts-uas/'],
                        ['fa-graduation-cap', 'Skripsi', 'Skripsi & Tesis', 'Unggah dokumen skripsi dan tesis untuk mahasiswa', 'https://warso-id.github.io/form-skripsi-tesis/'],
                        ['fa-book-open', 'Publikasi', 'Monitoring Publikasi Jurnal', 'Pantau dan kelola publikasi jurnal ilmiah secara real-time', 'https://warso-id.github.io/form-jurnal-mik/'],
                        ['fa-circle-check', 'Similarity', 'Upload Similarity Tesis', 'Cek dan unggah similarity tesis dengan mudah', 'https://warso-id.github.io/cek_cimilarity_tesis/']
                    ];
                    for (const [icon, tag, title, desc, url] of defaults) {
                        await apiCall('addService', { icon, tag, title, desc, url });
                    }
                    showToast('Data berhasil direset ke default ✅');
                    loadData();
                } catch (err) {
                    showToast('Gagal reset: ' + err.message, 'error');
                }
            }

            // ─── MODAL ───
            function openAddModal() {
                modalTitle.innerHTML = '<i class="fas fa-plus-circle"></i> Tambah Layanan';
                modalSub.textContent = 'Isi data layanan baru';
                editIdInput.value = '';
                iconInput.value = '';
                tagInput.value = '';
                titleInput.value = '';
                descInput.value = '';
                urlInput.value = '';
                btnSubmit.textContent = 'Tambah';
                modalOverlay.classList.add('active');
                setTimeout(() => iconInput.focus(), 100);
            }

            async function openEditModal(id) {
                const result = await apiCall('getServices');
                if (!result.success || !result.data) {
                    showToast('Gagal mengambil data', 'error');
                    return;
                }
                const item = result.data.find(d => d.id === id);
                if (!item) {
                    showToast('Data tidak ditemukan', 'error');
                    return;
                }
                modalTitle.innerHTML = '<i class="fas fa-edit"></i> Edit Layanan';
                modalSub.textContent = 'Perbarui data layanan';
                editIdInput.value = id;
                iconInput.value = item.icon || '';
                tagInput.value = item.tag || '';
                titleInput.value = item.title || '';
                descInput.value = item.description || item.desc || '';
                urlInput.value = item.url || '';
                btnSubmit.textContent = 'Simpan Perubahan';
                modalOverlay.classList.add('active');
                setTimeout(() => iconInput.focus(), 100);
            }

            function closeModal() { modalOverlay.classList.remove('active'); }

            // ─── FORM SUBMIT ───
            modalForm.addEventListener('submit', function(e) {
                e.preventDefault();

                const id = editIdInput.value;
                const icon = iconInput.value.trim();
                const tag = tagInput.value.trim();
                const title = titleInput.value.trim();
                const desc = descInput.value.trim();
                const url = urlInput.value.trim();

                if (!icon || !tag || !title || !desc || !url) {
                    showToast('⚠️ Semua field wajib diisi!', 'error');
                    return;
                }
                if (!url.startsWith('https://')) {
                    showToast('⚠️ URL harus diawali dengan https://', 'error');
                    return;
                }
                if (!icon.startsWith('fa-')) {
                    showToast('⚠️ Ikon harus diawali dengan "fa-"', 'error');
                    return;
                }

                if (id) {
                    updateItem(id, icon, tag, title, desc, url);
                } else {
                    addItem(icon, tag, title, desc, url);
                }
                closeModal();
            });

            // ─── EVENT BINDING ───
            btnCancel.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', function(e) { if (e.target === this) closeModal(); });
            btnAdd.addEventListener('click', openAddModal);
            document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

            btnLogout.addEventListener('click', function() {
                if (confirm('Yakin ingin logout?')) {
                    sessionStorage.removeItem('admin_logged_in');
                    sessionStorage.removeItem('admin_token');
                    sessionStorage.removeItem('admin_username');
                    window.location.href = 'admin-login.html';
                }
            });

            btnResetDefault.addEventListener('click', resetToDefault);

            // ─── INIT ───
            loadData();
            const username = sessionStorage.getItem('admin_username') || 'Admin';
            showToast('Selamat datang, ' + username + '! 👋');

        })();
    </script>

</body>
</html>
