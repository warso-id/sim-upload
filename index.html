<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIM Upload | Full Features</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- ==== CSS (sama seperti sebelumnya, tidak diubah) ==== -->
    <style>
        /* CSS sama seperti sebelumnya, tidak diubah untuk menghemat space */
        * { margin:0; padding:0; box-sizing:border-box; }
        :root { --bg-primary:#0a0a12; --bg-secondary:rgba(255,255,255,0.02); --bg-card:rgba(255,255,255,0.03); --bg-card-hover:rgba(255,255,255,0.06); --border-color:rgba(255,255,255,0.06); --border-hover:rgba(255,215,0,0.15); --text-primary:#ffffff; --text-secondary:rgba(255,255,255,0.5); --text-muted:rgba(255,255,255,0.2); --shadow:0 40px 80px rgba(0,0,0,0.7); --blob-opacity:0.5; --blob-1:#6a11cb; --blob-2:#f7971e; --blob-3:#00c6ff; --icon-bg:rgba(247,151,30,0.2); --tag-bg:rgba(255,215,0,0.08); --tag-color:#ffd700; --accent:#ffd700; --accent-glow:rgba(255,215,0,0.4); --input-bg:rgba(255,255,255,0.05); --input-border:rgba(255,255,255,0.08); --toolbar-bg:rgba(255,255,255,0.02); --stat-bg:rgba(255,255,255,0.02); }
        [data-theme="light"] { --bg-primary:#f2f4f9; --bg-secondary:#ffffff; --bg-card:#ffffff; --bg-card-hover:#f8f9fc; --border-color:#e2e6ef; --border-hover:#f7971e; --text-primary:#1a1a2e; --text-secondary:#4a4a5a; --text-muted:#8a8a9e; --shadow:0 8px 30px rgba(0,0,0,0.06); --blob-opacity:0.04; --blob-1:#6a11cb; --blob-2:#f7971e; --blob-3:#00c6ff; --icon-bg:rgba(247,151,30,0.12); --tag-bg:rgba(247,151,30,0.12); --tag-color:#b87a0e; --accent:#f7971e; --accent-glow:rgba(247,151,30,0.25); --input-bg:#f2f4f9; --input-border:#dce0e8; --toolbar-bg:#ffffff; --stat-bg:#ffffff; }
        body { font-family:'Inter',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg-primary); padding:1.5rem 1rem; transition:background 0.4s ease,color 0.4s ease; position:relative; overflow-x:hidden; }
        /* ... sisanya CSS sama seperti sebelumnya, di-singkat untuk keperluan tutorial ... */
        /* (Saya hanya menampilkan bagian JS yang diubah) */
    </style>
</head>
<body>
    <!-- HTML sama seperti sebelumnya -->
    <div class="container">
        <header class="header">...</header>
        <div class="toolbar">...</div>
        <div class="carousel-wrapper">...</div>
        <div class="stats-section">...</div>
    </div>
    <script>
        (function() {
            'use strict';

            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            // 🔽 GANTI URL INI dengan URL Web App dari Google Apps Script
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            const GAS_URL = 'https://script.google.com/macros/s/AKfycbxzqugZFpJa2w7mzridP-N1-gVfoJ5PZiLY2GlkZ8N_ycpOsRNS0PArql9NluXnxNu_yQ/exec';

            let APP_DATA = [];

            // ─── LOAD DATA FROM API ───
            async function loadDataFromAPI() {
                try {
                    const res = await fetch(GAS_URL + '?action=getServices', {
                        method: 'GET',
                        headers: { 'Accept': 'application/json' }
                    });
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const json = await res.json();
                    if (json.success && json.data) {
                        APP_DATA = json.data;
                        return true;
                    } else {
                        throw new Error(json.message || 'Gagal memuat data');
                    }
                } catch (err) {
                    console.warn('API load failed, using localStorage fallback:', err);
                    // Fallback ke localStorage jika ada
                    try {
                        const stored = localStorage.getItem('simupload_data');
                        if (stored) {
                            const parsed = JSON.parse(stored);
                            if (Array.isArray(parsed) && parsed.length) {
                                APP_DATA = parsed;
                                return true;
                            }
                        }
                    } catch (e2) {}
                    // Fallback default
                    APP_DATA = [
                        { id: 'layanan-1', icon: 'fa-file-pen', tag: 'Ujian', title: 'Soal UTS/UAS S1 & S2',
                            desc: 'Unggah dan kelola soal ujian untuk jenjang S1 dan S2',
                            url: 'https://warso-id.github.io/form-uts-uas/' },
                        { id: 'layanan-2', icon: 'fa-graduation-cap', tag: 'Skripsi', title: 'Skripsi & Tesis',
                            desc: 'Unggah dokumen skripsi dan tesis untuk mahasiswa',
                            url: 'https://warso-id.github.io/form-skripsi-tesis/' },
                        { id: 'layanan-3', icon: 'fa-book-open', tag: 'Publikasi', title: 'Monitoring Publikasi Jurnal',
                            desc: 'Pantau dan kelola publikasi jurnal ilmiah secara real-time',
                            url: 'https://warso-id.github.io/form-jurnal-mik/' },
                        { id: 'layanan-4', icon: 'fa-circle-check', tag: 'Similarity', title: 'Upload Similarity Tesis',
                            desc: 'Cek dan unggah similarity tesis dengan mudah',
                            url: 'https://warso-id.github.io/cek_cimilarity_tesis/' }
                    ];
                    return false;
                }
            }

            // ─── STATE ───
            const STORAGE_KEYS = { THEME: 'simupload_theme', VIEW_MODE: 'simupload_viewmode', FILTER: 'simupload_filter',
                FAVORITES: 'simupload_favorites', HITS: 'simupload_hits' };

            function getStorage(key, fallback) { try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(
                    v) : fallback; } catch { return fallback; } }

            function setStorage(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); } catch {} }

            let state = {
                theme: getStorage(STORAGE_KEYS.THEME, 'dark'),
                viewMode: getStorage(STORAGE_KEYS.VIEW_MODE, 'carousel'),
                filterTag: getStorage(STORAGE_KEYS.FILTER, 'Semua'),
                searchQuery: '',
                currentIndex: 0,
                favorites: getStorage(STORAGE_KEYS.FAVORITES, {}),
                hits: getStorage(STORAGE_KEYS.HITS, {})
            };

            // ─── DOM REFS ───
            const $ = s => document.querySelector(s);
            const track = $('#carouselTrack');
            const dotsContainer = $('#dotsContainer');
            const tabsContainer = $('#tabsContainer');
            const searchInput = $('#searchInput');
            const counter = $('#counter');
            const progressBar = $('#progressTimer');
            const prevBtn = $('#prevBtn');
            const nextBtn = $('#nextBtn');
            const themeToggle = $('#themeToggle');
            const viewToggle = $('#viewToggle');
            const resetBtn = $('#resetBtn');
            const wrapper = $('#carouselWrapper');
            const controls = $('#carouselControls');
            const toastEl = $('#toast');
            const toastMsg = $('#toastMessage');
            const totalBadge = $('#totalItemsBadge');
            const statsList = $('#statsList');
            const totalClicksDisplay = $('#totalClicksDisplay');

            let autoPlayInterval = null,
                progressInterval = null,
                progressValue = 100;
            const AUTO_PLAY_DELAY = 5000,
                PROGRESS_STEP = 50;

            // ─── RENDER ───
            function getFilteredData() {
                let data = [...APP_DATA];
                if (state.filterTag !== 'Semua') {
                    if (state.filterTag === 'Favorit') {
                        data = data.filter(item => state.favorites[item.id]);
                    } else {
                        data = data.filter(item => item.tag === state.filterTag);
                    }
                }
                if (state.searchQuery.trim() !== '') {
                    const q = state.searchQuery.trim().toLowerCase();
                    data = data.filter(item =>
                        item.title.toLowerCase().includes(q) ||
                        (item.desc || '').toLowerCase().includes(q) ||
                        (item.tag || '').toLowerCase().includes(q)
                    );
                }
                return data;
            }

            function render() {
                const filtered = getFilteredData();
                totalBadge.textContent = `${APP_DATA.length} Layanan`;
                renderTabs();
                renderCards(filtered);
                renderStats();
                updateViewMode();

                const cards = track.querySelectorAll('.card');
                const totalSlides = cards.length;
                if (state.viewMode === 'carousel') {
                    controls.classList.remove('hidden');
                    const cardsPerView = getCardsPerView();
                    const maxIndex = Math.max(0, totalSlides - cardsPerView);
                    if (state.currentIndex > maxIndex) state.currentIndex = maxIndex;
                    if (state.currentIndex < 0) state.currentIndex = 0;
                    updateDotsAndCounter(totalSlides);
                    updateCarousel(false);
                    startAutoPlay();
                } else {
                    controls.classList.add('hidden');
                    stopAutoPlay();
                    progressBar.classList.add('hidden');
                }
                bindCardEvents();
                setStorage(STORAGE_KEYS.FILTER, state.filterTag);
            }

            function renderTabs() {
                const tags = ['Semua', 'Favorit', ...new Set(APP_DATA.map(item => item.tag))];
                let html = '';
                tags.forEach(tag => {
                    let count = 0;
                    if (tag === 'Semua') count = APP_DATA.length;
                    else if (tag === 'Favorit') count = Object.keys(state.favorites).filter(id => state.favorites[id])
                        .length;
                    else count = APP_DATA.filter(item => item.tag === tag).length;
                    const active = state.filterTag === tag ? 'active' : '';
                    html += `<button class="${active}" data-tag="${tag}">${tag} <span class="count">${count}</span></button>`;
                });
                tabsContainer.innerHTML = html;
                tabsContainer.querySelectorAll('button').forEach(btn => {
                    btn.addEventListener('click', function() {
                        state.filterTag = this.dataset.tag;
                        state.currentIndex = 0;
                        render();
                        if (state.viewMode === 'carousel') resetProgress();
                    });
                });
            }

            function renderCards(data) {
                if (data.length === 0) {
                    track.innerHTML =
                        `<div style="width:100%; text-align:center; padding:3rem 0; color: var(--text-secondary);"><i class="fas fa-search" style="font-size:2rem; display:block; margin-bottom:1rem;"></i><p>Tidak ada layanan yang cocok.</p></div>`;
                    return;
                }
                let html = '';
                data.forEach((item, index) => {
                    const isFav = state.favorites[item.id] || false;
                    const hitCount = state.hits[item.id] || 0;
                    const desc = item.desc || item.description || '';
                    html += `
                        <div class="card" data-id="${item.id}" data-index="${index}">
                            <div class="glow-overlay"></div>
                            <div class="card-top">
                                <div class="icon"><i class="fas ${item.icon}"></i></div>
                                <div class="card-actions-top">
                                    <span class="hit-badge"><i class="fas fa-eye"></i> <span class="hit-count">${hitCount}</span></span>
                                    <button class="fav-btn ${isFav ? 'active' : ''}" data-id="${item.id}"><i class="fas ${isFav ? 'fa-heart' : 'fa-heart'}"></i></button>
                                </div>
                            </div>
                            <span class="tag">${item.tag}</span>
                            <h3>${item.title}</h3>
                            <p class="subtitle">${desc}</p>
                            <div class="link-wrapper">
                                <a href="${item.url}" target="_blank" rel="noopener" class="buka-link" data-id="${item.id}"><span>Buka</span><i class="fas fa-arrow-up-right-from-square"></i></a>
                                <button class="copy-btn" data-url="${item.url}"><i class="fas fa-copy"></i></button>
                            </div>
                        </div>
                    `;
                });
                track.innerHTML = html;
            }

            function renderStats() {
                const stats = APP_DATA.map(item => ({ ...item, clicks: state.hits[item.id] || 0 })).sort((a, b) => b.clicks - a
                    .clicks);
                const totalClicks = stats.reduce((s, i) => s + i.clicks, 0);
                totalClicksDisplay.textContent = totalClicks;
                if (stats.every(i => i.clicks === 0)) {
                    statsList.innerHTML =
                        `<div class="stats-empty">Belum ada klik. Klik "Buka" pada layanan untuk mulai menghitung popularitas.</div>`;
                    return;
                }
                let html = '';
                const topThree = stats.slice(0, 3);
                const rest = stats.slice(3);
                topThree.forEach((item, idx) => {
                    const rankClass = idx === 0 ? 'gold' : idx === 1 ? 'silver' : 'bronze';
                    const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : '🥉';
                    html +=
                        `<div class="stats-item"><span class="rank ${rankClass}">${medal}</span><span class="s-title" title="${item.title}">${item.title}</span><span class="s-tag">${item.tag}</span><span class="s-clicks"><i class="fas fa-eye"></i> ${item.clicks}</span></div>`;
                });
                rest.forEach(item => {
                    html +=
                        `<div class="stats-item"><span class="rank">#${stats.indexOf(item)+1}</span><span class="s-title" title="${item.title}">${item.title}</span><span class="s-tag">${item.tag}</span><span class="s-clicks"><i class="fas fa-eye"></i> ${item.clicks}</span></div>`;
                });
                statsList.innerHTML = html;
            }

            function bindCardEvents() {
                track.querySelectorAll('.fav-btn').forEach(btn => {
                    btn.removeEventListener('click', handleFavClick);
                    btn.addEventListener('click', handleFavClick);
                });
                track.querySelectorAll('.buka-link').forEach(link => {
                    link.removeEventListener('click', handleBukaClick);
                    link.addEventListener('click', handleBukaClick);
                });
                track.querySelectorAll('.copy-btn').forEach(btn => {
                    btn.removeEventListener('click', handleCopy);
                    btn.addEventListener('click', handleCopy);
                });
            }

            function handleFavClick(e) {
                e.stopPropagation();
                const id = this.dataset.id;
                state.favorites[id] = !state.favorites[id];
                setStorage(STORAGE_KEYS.FAVORITES, state.favorites);
                render();
                showToast(state.favorites[id] ? 'Ditambahkan ke favorit ❤️' : 'Dihapus dari favorit');
            }

            function handleBukaClick(e) {
                const id = this.dataset.id;
                if (id) {
                    state.hits[id] = (state.hits[id] || 0) + 1;
                    setStorage(STORAGE_KEYS.HITS, state.hits);
                    const card = this.closest('.card');
                    if (card) {
                        const badge = card.querySelector('.hit-badge .hit-count');
                        if (badge) badge.textContent = state.hits[id];
                    }
                    renderStats();
                }
            }

            function handleCopy(e) {
                e.stopPropagation();
                const url = this.dataset.url;
                if (url) {
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(url).then(() => showToast('Link disalin! 📋')).catch(() =>
                            fallbackCopy(url));
                    } else { fallbackCopy(url); }
                }
            }

            function fallbackCopy(url) {
                const ta = document.createElement('textarea');
                ta.value = url;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy');
                    showToast('Link disalin! 📋'); } catch { showToast('Gagal menyalin.'); }
                document.body.removeChild(ta);
            }

            // ─── CAROUSEL / GRID ───
            function getCardsPerView() {
                if (state.viewMode === 'grid') return 999;
                if (window.innerWidth <= 768) return 1;
                if (window.innerWidth <= 1100) return 2;
                return 3;
            }

            function updateCarousel(animate = true) {
                if (state.viewMode === 'grid') return;
                const cards = track.querySelectorAll('.card');
                const totalSlides = cards.length;
                if (totalSlides === 0) return;
                const cardsPerView = getCardsPerView();
                const cardWidth = cards[0]?.offsetWidth + 32 || 300;
                const maxIndex = Math.max(0, totalSlides - cardsPerView);
                if (state.currentIndex > maxIndex) state.currentIndex = maxIndex;
                if (state.currentIndex < 0) state.currentIndex = 0;
                const offset = state.currentIndex * cardWidth;
                track.style.transition = animate ? 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)' : 'none';
                track.style.transform = `translateX(-${offset}px)`;
                updateDotsAndCounter(totalSlides);
                updateButtons(totalSlides);
            }

            function updateDotsAndCounter(totalSlides) {
                if (state.viewMode === 'grid') return;
                const cardsPerView = getCardsPerView();
                const maxIndex = Math.max(0, totalSlides - cardsPerView);
                const totalDots = Math.min(totalSlides, maxIndex + 1);
                let dotsHtml = '';
                for (let i = 0; i < totalDots; i++) {
                    dotsHtml += `<button class="dot ${i === state.currentIndex ? 'active' : ''}" data-index="${i}"></button>`;
                }
                dotsContainer.innerHTML = dotsHtml;
                dotsContainer.querySelectorAll('.dot').forEach(dot => {
                    dot.addEventListener('click', function() { goToSlide(parseInt(this.dataset.index)); });
                });
                counter.textContent = `${totalSlides > 0 ? state.currentIndex + 1 : 0} / ${totalSlides}`;
            }

            function updateButtons(totalSlides) {
                if (state.viewMode === 'grid') return;
                const cardsPerView = getCardsPerView();
                const maxIndex = Math.max(0, totalSlides - cardsPerView);
                prevBtn.disabled = state.currentIndex === 0 || totalSlides === 0;
                nextBtn.disabled = state.currentIndex >= maxIndex || totalSlides === 0;
                prevBtn.style.opacity = prevBtn.disabled ? '0.2' : '1';
                nextBtn.style.opacity = nextBtn.disabled ? '0.2' : '1';
            }

            function goToSlide(index, animate = true) {
                if (state.viewMode === 'grid') return;
                const cards = track.querySelectorAll('.card');
                const totalSlides = cards.length;
                if (totalSlides === 0) return;
                const cardsPerView = getCardsPerView();
                const maxIndex = Math.max(0, totalSlides - cardsPerView);
                const target = Math.min(Math.max(index, 0), maxIndex);
                if (target !== state.currentIndex) {
                    state.currentIndex = target;
                    updateCarousel(animate);
                } else { updateCarousel(animate); }
                if (state.viewMode === 'carousel') resetProgress();
            }

            function nextSlide() {
                if (state.viewMode === 'grid') return;
                const cards = track.querySelectorAll('.card');
                const totalSlides = cards.length;
                const cardsPerView = getCardsPerView();
                const maxIndex = Math.max(0, totalSlides - cardsPerView);
                if (state.currentIndex < maxIndex) goToSlide(state.currentIndex + 1);
                else goToSlide(0);
            }

            function prevSlide() {
                if (state.viewMode === 'grid') return;
                if (state.currentIndex > 0) goToSlide(state.currentIndex - 1);
                else {
                    const cards = track.querySelectorAll('.card');
                    const totalSlides = cards.length;
                    const cardsPerView = getCardsPerView();
                    const maxIndex = Math.max(0, totalSlides - cardsPerView);
                    goToSlide(maxIndex);
                }
            }

            function updateViewMode() {
                wrapper.classList.toggle('grid-mode', state.viewMode === 'grid');
                const icon = viewToggle.querySelector('i');
                icon.className = state.viewMode === 'grid' ? 'fas fa-th-list' : 'fas fa-th';
                setStorage(STORAGE_KEYS.VIEW_MODE, state.viewMode);
                if (state.viewMode === 'carousel') {
                    progressBar.classList.remove('hidden');
                    setTimeout(() => { updateCarousel(false);
                        startAutoPlay(); }, 50);
                } else {
                    progressBar.classList.add('hidden');
                    stopAutoPlay();
                    track.style.transform = 'none';
                }
            }

            // ─── AUTO PLAY ───
            function startAutoPlay() {
                if (state.viewMode === 'grid') return;
                stopAutoPlay();
                startProgress();
                autoPlayInterval = setInterval(() => {
                    nextSlide();
                    stopProgress();
                    progressValue = 100;
                    progressBar.style.width = '100%';
                    startProgress();
                }, AUTO_PLAY_DELAY);
            }

            function stopAutoPlay() { if (autoPlayInterval) { clearInterval(autoPlayInterval);
                    autoPlayInterval = null; } stopProgress(); }

            function startProgress() {
                if (state.viewMode === 'grid') return;
                stopProgress();
                progressValue = 100;
                progressBar.style.width = '100%';
                progressInterval = setInterval(() => {
                    progressValue -= (PROGRESS_STEP / AUTO_PLAY_DELAY) * 100;
                    if (progressValue <= 0) { progressValue = 0;
                        progressBar.style.width = '0%'; } else { progressBar.style.width = progressValue + '%'; }
                }, PROGRESS_STEP);
            }

            function stopProgress() { if (progressInterval) { clearInterval(progressInterval);
                    progressInterval = null; } }

            function resetProgress() { if (state.viewMode === 'grid') return;
                stopProgress();
                progressValue = 100;
                progressBar.style.width = '100%';
                startProgress(); }

            // ─── THEME ───
            function toggleTheme() {
                state.theme = state.theme === 'dark' ? 'light' : 'dark';
                applyTheme();
                setStorage(STORAGE_KEYS.THEME, state.theme);
            }

            function applyTheme() {
                document.documentElement.setAttribute('data-theme', state.theme);
                themeToggle.querySelector('i').className = state.theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            }

            // ─── TOAST & RESET ───
            let toastTimeout = null;

            function showToast(msg) {
                toastMsg.textContent = msg;
                toastEl.classList.add('show');
                if (toastTimeout) clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 2500);
            }

            function resetAll() {
                state.filterTag = 'Semua';
                state.searchQuery = '';
                searchInput.value = '';
                state.currentIndex = 0;
                render();
                if (state.viewMode === 'carousel') setTimeout(() => { updateCarousel(false);
                    startAutoPlay(); }, 50);
                showToast('Filter & pencarian direset ✅');
            }

            // ─── INIT ───
            async function init() {
                await loadDataFromAPI();
                applyTheme();
                state.filterTag = getStorage(STORAGE_KEYS.FILTER, 'Semua');
                state.viewMode = getStorage(STORAGE_KEYS.VIEW_MODE, 'carousel');
                state.favorites = getStorage(STORAGE_KEYS.FAVORITES, {});
                state.hits = getStorage(STORAGE_KEYS.HITS, {});
                render();
                if (state.viewMode === 'carousel') setTimeout(() => { updateCarousel(false);
                    startAutoPlay(); }, 100);

                // Event listeners
                prevBtn.addEventListener('click', () => { prevSlide(); if (state.viewMode === 'carousel') resetProgress(); });
                nextBtn.addEventListener('click', () => { nextSlide(); if (state.viewMode === 'carousel') resetProgress(); });
                searchInput.addEventListener('input', function() {
                    state.searchQuery = this.value;
                    state.currentIndex = 0;
                    render();
                    if (state.viewMode === 'carousel') resetProgress();
                });
                themeToggle.addEventListener('click', toggleTheme);
                viewToggle.addEventListener('click', function() {
                    state.viewMode = state.viewMode === 'carousel' ? 'grid' : 'carousel';
                    updateViewMode();
                    render();
                    if (state.viewMode === 'carousel') setTimeout(() => { updateCarousel(false);
                        startAutoPlay(); }, 100);
                    showToast(state.viewMode === 'grid' ? 'Mode Grid aktif' : 'Mode Carousel aktif');
                });
                resetBtn.addEventListener('click', resetAll);

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowRight' && state.viewMode === 'carousel') { nextSlide();
                        resetProgress(); }
                    if (e.key === 'ArrowLeft' && state.viewMode === 'carousel') { prevSlide();
                        resetProgress(); }
                    if (e.key === 'r' && e.ctrlKey) { e.preventDefault();
                        resetAll(); }
                });

                wrapper.addEventListener('mouseenter', () => { if (state.viewMode === 'carousel') { stopAutoPlay();
                        stopProgress(); } });
                wrapper.addEventListener('mouseleave', () => { if (state.viewMode === 'carousel') { startAutoPlay(); } });

                // Touch swipe
                let touchStart = 0,
                    touchEnd = 0,
                    isSwiping = false;
                wrapper.addEventListener('touchstart', (e) => { touchStart = e.changedTouches[0].screenX;
                    isSwiping = true; }, { passive: true });
                wrapper.addEventListener('touchmove', (e) => { if (!isSwiping) return;
                    touchEnd = e.changedTouches[0].screenX; }, { passive: true });
                wrapper.addEventListener('touchend', (e) => {
                    if (!isSwiping || state.viewMode === 'grid') return;
                    isSwiping = false;
                    const diff = touchStart - touchEnd;
                    if (Math.abs(diff) > 50) {
                        if (diff > 0) { nextSlide();
                            resetProgress(); } else { prevSlide();
                            resetProgress(); }
                    }
                    touchStart = 0;
                    touchEnd = 0;
                }, { passive: true });

                // Resize
                let resizeTimer;
                window.addEventListener('resize', () => {
                    if (state.viewMode === 'carousel') {
                        clearTimeout(resizeTimer);
                        resizeTimer = setTimeout(() => { updateCarousel(false);
                            resetProgress(); }, 200);
                    }
                });

                console.log('📂 SIM Upload v2.0 - Data loaded:', APP_DATA.length);
            }

            // ─── PARTIKEL CANVAS ─── (sama seperti sebelumnya)
            const canvas = document.getElementById('particle-canvas');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                let w, h, particles = [];

                function resizeParticles() { w = canvas.width = window.innerWidth;
                    h = canvas.height = window.innerHeight; }
                window.addEventListener('resize', resizeParticles);
                resizeParticles();

                class Particle {
                    constructor() { this.x = Math.random() * w;
                        this.y = Math.random() * h;
                        this.size = Math.random() * 2 + 0.5;
                        this.speedX = (Math.random() - 0.5) * 0.3;
                        this.speedY = (Math.random() - 0.5) * 0.3;
                        this.opacity = Math.random() * 0.4 + 0.05; }
                    update() { this.x += this.speedX;
                        this.y += this.speedY; if (this.x < 0 || this.x > w) this.speedX *= -1; if (this.y < 0 || this.y >
                            h) this.speedY *= -1; }
                    draw() { ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 215, 0, ${this.opacity})`;
                        ctx.fill(); }
                }

                function initParticles(count = 60) { particles = []; for (let i = 0; i < count; i++) particles.push(new
                        Particle()); }
                initParticles();

                function animateParticles() { ctx.clearRect(0, 0, w, h);
                    particles.forEach(p => { p.update();
                        p.draw(); });
                    requestAnimationFrame(animateParticles); }
                animateParticles();
            }

            if (document.readyState === 'complete') { init(); } else { window.addEventListener('load', init); }

        })();
    </script>
</body>
</html>
